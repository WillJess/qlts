<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý Tài sản CNTT — Công ty TNHH Sơn Tùng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3c; --line2:#363c4b;
  --ink:#e8eaf0; --ink2:#aab1c4; --ink3:#727a8e;
  --accent:#f5a524; --accent2:#ffb84d; --accentink:#1a1205;
  --teal:#34d3c0; --green:#3ecf8e; --blue:#5b9dff; --red:#ff6b6b; --amber:#f5a524; --gray:#6b7280;
  --shadow:0 12px 40px rgba(0,0,0,.45);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Be Vietnam Pro',system-ui,-apple-system,Segoe UI,sans-serif;
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(245,165,36,.10), transparent 60%),
    radial-gradient(900px 500px at -5% 110%, rgba(52,211,192,.07), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:248px;flex:0 0 248px;background:linear-gradient(180deg,#13151c,#0d0f14);
  border-right:1px solid var(--line);position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;padding:22px 16px;gap:6px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px}
.brand .logo{
  width:42px;height:42px;border-radius:11px;flex:0 0 42px;
  background:linear-gradient(135deg,var(--accent),#e8890f);
  display:grid;place-items:center;color:var(--accentink);font-weight:800;font-size:18px;
  box-shadow:0 6px 18px rgba(245,165,36,.35);
}
.brand h1{font-size:15px;font-weight:700;letter-spacing:.2px;line-height:1.15}
.brand p{font-size:11px;color:var(--ink3);margin-top:2px}
.nav{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.nav-label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding:14px 10px 6px;font-weight:700}
.navitem{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;
  color:var(--ink2);font-weight:500;transition:.16s;width:100%;text-align:left;position:relative;
}
.navitem svg{width:18px;height:18px;opacity:.85;flex:0 0 18px}
.navitem:hover{background:var(--panel);color:var(--ink)}
.navitem.active{background:linear-gradient(90deg,rgba(245,165,36,.16),rgba(245,165,36,.04));color:var(--ink)}
.navitem.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}
.navitem .badge{margin-left:auto;font-size:11px;background:var(--panel2);color:var(--ink2);padding:1px 8px;border-radius:20px;font-weight:600}
.side-foot{margin-top:auto;font-size:11px;color:var(--ink3);padding:12px 10px;border-top:1px solid var(--line);line-height:1.6}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:18px;
  padding:16px 28px;background:rgba(15,17,21,.82);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.search{position:relative;flex:1;max-width:560px}
.search input{
  width:100%;padding:12px 16px 12px 44px;background:var(--panel);border:1px solid var(--line2);
  border-radius:12px;color:var(--ink);outline:none;transition:.16s;
}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,165,36,.13)}
.search .sicon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink3);width:18px;height:18px}
.search-results{
  position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--panel);
  border:1px solid var(--line2);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;
  max-height:420px;overflow-y:auto;display:none;z-index:40;
}
.search-results.show{display:block}
.sr-group{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:700;padding:10px 16px 4px}
.sr-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent}
.sr-item:hover{background:var(--panel2);border-left-color:var(--accent)}
.sr-item .dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.sr-item .t{font-weight:600;font-size:13px}
.sr-item .s{font-size:11.5px;color:var(--ink3)}
.sr-empty{padding:18px 16px;color:var(--ink3);font-size:13px}
.topbar .who{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink2)}
.topbar .who .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#1f9c8e);display:grid;place-items:center;font-weight:700;color:#05201d;font-size:13px}

.content{padding:28px;max-width:1280px;width:100%;margin:0 auto}
.page-head{margin-bottom:22px}
.page-head h2{font-size:24px;font-weight:800;letter-spacing:-.3px}
.page-head p{color:var(--ink3);margin-top:4px;font-size:13.5px}

/* ===== Stat cards ===== */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:26px}
.stat{
  background:linear-gradient(160deg,var(--panel),#14161d);border:1px solid var(--line);
  border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:.18s;cursor:default;
}
.stat:hover{transform:translateY(-3px);border-color:var(--line2)}
.stat::after{content:"";position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:50%;background:var(--c,rgba(245,165,36,.13));filter:blur(8px);opacity:.5}
.stat .ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;margin-bottom:14px;position:relative;z-index:1}
.stat .ic svg{width:22px;height:22px}
.stat .num{font-size:34px;font-weight:800;letter-spacing:-1px;line-height:1;position:relative;z-index:1}
.stat .lbl{color:var(--ink2);font-size:13px;margin-top:7px;font-weight:500;position:relative;z-index:1}

.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
.card h3{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:9px}
.card h3 .pin{width:7px;height:18px;border-radius:4px;background:var(--accent)}

/* bar list */
.bar{margin-bottom:13px}
.bar .top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.bar .top b{font-weight:600}
.bar .top span{color:var(--ink3);font-weight:600}
.bar .track{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden}
.bar .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2))}

.statuspill{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;background:var(--panel2);margin:0 0 9px;width:100%;justify-content:space-between}
.statuspill .l{display:flex;align-items:center;gap:9px;font-size:12.5px}
.statuspill .l .d{width:9px;height:9px;border-radius:50%}
.statuspill b{font-weight:700;font-size:14px}

/* ===== Table ===== */
.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input{
  padding:10px 13px;background:var(--panel);border:1px solid var(--line2);border-radius:10px;color:var(--ink);outline:none;
}
.toolbar select:focus,.toolbar input:focus{border-color:var(--accent)}
.toolbar .count{margin-left:auto;color:var(--ink3);font-size:12.5px;font-weight:600}
.tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{
  text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);
  font-weight:700;padding:13px 16px;border-bottom:1px solid var(--line);background:var(--panel2);position:sticky;top:0
}
tbody td{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
tbody tr{cursor:pointer;transition:.12s}
tbody tr:hover{background:var(--panel2)}
tbody tr:last-child td{border-bottom:none}
.tag{font-weight:600;font-size:12.5px}
.muted{color:var(--ink3)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
.chip .d{width:7px;height:7px;border-radius:50%}
.empty-state{padding:60px 20px;text-align:center;color:var(--ink3)}
.empty-state svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}

.pager{display:flex;gap:6px;justify-content:center;align-items:center;padding:16px;flex-wrap:wrap}
.pager button{padding:7px 12px;border-radius:8px;background:var(--panel2);border:1px solid var(--line2);color:var(--ink2);font-weight:600;font-size:12.5px}
.pager button:hover{border-color:var(--accent);color:var(--ink)}
.pager button.active{background:var(--accent);color:var(--accentink);border-color:var(--accent)}
.pager button:disabled{opacity:.4;cursor:not-allowed}

/* employee / dept cards */
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ecard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.16s;display:flex;gap:13px;align-items:flex-start}
.ecard:hover{transform:translateY(-2px);border-color:var(--accent)}
.ecard .av{width:44px;height:44px;border-radius:11px;flex:0 0 44px;display:grid;place-items:center;font-weight:700;font-size:15px;color:#05201d}
.ecard .n{font-weight:700;font-size:14px;line-height:1.25}
.ecard .sub{color:var(--ink3);font-size:12px;margin-top:3px}
.ecard .meta{margin-top:9px;display:flex;gap:8px;flex-wrap:wrap}
.ecard .mp{font-size:11px;background:var(--panel2);padding:3px 9px;border-radius:7px;color:var(--ink2);font-weight:600}

/* ===== Modal / detail ===== */
.overlay{position:fixed;inset:0;background:rgba(5,7,11,.66);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:18px;width:100%;max-width:760px;box-shadow:var(--shadow);overflow:hidden;animation:pop .22s cubic-bezier(.2,.8,.2,1)}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:16px;background:linear-gradient(180deg,var(--panel2),var(--panel))}
.modal-head .ic{width:50px;height:50px;border-radius:13px;flex:0 0 50px;display:grid;place-items:center}
.modal-head .ic svg{width:26px;height:26px}
.modal-head .ttl{flex:1;min-width:0}
.modal-head .ttl h3{font-size:19px;font-weight:800;letter-spacing:-.3px}
.modal-head .ttl .sub{color:var(--ink3);font-size:13px;margin-top:3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-head .x{flex:0 0 auto;width:36px;height:36px;border-radius:10px;background:var(--panel2);display:grid;place-items:center;color:var(--ink2);font-size:20px;line-height:1}
.modal-head .x:hover{background:var(--line2);color:var(--ink)}
.modal-body{padding:8px 24px 24px;max-height:62vh;overflow-y:auto}
.modal-foot{padding:18px 24px;border-top:1px solid var(--line);display:flex;gap:12px;justify-content:flex-end;background:var(--panel2)}

.btn{padding:11px 20px;border-radius:11px;font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;gap:8px;transition:.15s}
.btn svg{width:17px;height:17px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#e8890f);color:var(--accentink)}
.btn-primary:hover{filter:brightness(1.08);box-shadow:0 6px 18px rgba(245,165,36,.3)}
.btn-danger{background:rgba(255,107,107,.13);color:var(--red);border:1px solid rgba(255,107,107,.3)}
.btn-danger:hover{background:rgba(255,107,107,.22)}
.btn-ghost{background:var(--panel2);color:var(--ink2);border:1px solid var(--line2)}
.btn-ghost:hover{color:var(--ink);border-color:var(--line2)}

.fieldgroup{margin-top:20px}
.fieldgroup .gh{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.fieldgroup .gh::after{content:"";flex:1;height:1px;background:var(--line)}
.frow{display:grid;grid-template-columns:200px 1fr;gap:14px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
.frow:last-child{border-bottom:none}
.frow .k{color:var(--ink3);font-weight:500}
.frow .v{color:var(--ink);font-weight:500;word-break:break-word;white-space:pre-wrap}

/* allocate form */
.form-field{margin-bottom:15px}
.form-field label{display:block;font-size:12.5px;color:var(--ink2);font-weight:600;margin-bottom:6px}
.form-field input,.form-field select{width:100%;padding:11px 13px;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;color:var(--ink);outline:none}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.seg{display:flex;gap:8px;margin-bottom:18px;background:var(--panel2);padding:5px;border-radius:11px}
.seg button{flex:1;padding:9px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink2)}
.seg button.active{background:var(--accent);color:var(--accentink)}
.note{background:rgba(91,157,255,.09);border:1px solid rgba(91,157,255,.22);border-radius:10px;padding:12px 14px;font-size:12.5px;color:#bcd4ff;margin-bottom:16px;display:flex;gap:10px}
.note svg{width:18px;height:18px;flex:0 0 18px;margin-top:1px}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--green);padding:14px 20px;border-radius:12px;box-shadow:var(--shadow);font-size:13.5px;font-weight:600;opacity:0;transition:.3s;z-index:200;display:flex;align-items:center;gap:10px;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:18px;height:18px;color:var(--green)}

.hide{display:none!important}
.resetbar{font-size:11px;color:var(--ink3);text-align:center;padding:10px}
.resetbar button{color:var(--accent);font-weight:600;text-decoration:underline}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#454c5e;background-clip:padding-box}
.menu-btn{display:none;width:40px;height:40px;border-radius:10px;background:var(--panel);border:1px solid var(--line2);color:var(--ink);place-items:center;flex:0 0 40px;cursor:pointer}
.menu-btn svg{width:20px;height:20px}
.side-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:45}
.side-backdrop.show{display:block}
@media(max-width:760px){
  .menu-btn{display:grid}
  .sidebar{position:fixed;left:0;top:0;z-index:50;height:100vh;height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(-106%);transition:transform .25s ease;box-shadow:0 0 50px rgba(0,0,0,.6);width:84vw;max-width:300px;flex-basis:auto}
  .sidebar.open{transform:translateX(0)}
  .topbar{padding:12px 14px;gap:12px}
  .content{padding:18px 14px}
  .modal{max-width:96vw}
  .frow{grid-template-columns:1fr;gap:2px}
  .frow .k{font-size:11.5px}
  .page-head h2{font-size:20px}
  .stats{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .toolbar{gap:8px}
  .toolbar input,.toolbar select{min-width:0;flex:1}
  .tablewrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
  .tablewrap table{min-width:680px}
}

/* ===== upgrade additions ===== */
.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
.page-head .ph-actions{display:flex;gap:10px}
.btn-add{padding:11px 18px;border-radius:11px;font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),#e8890f);color:var(--accentink);transition:.15s}
.btn-add:hover{filter:brightness(1.08);box-shadow:0 6px 18px rgba(245,165,36,.3)}
.btn-add svg{width:17px;height:17px}
.btn-add.alt{background:var(--panel2);color:var(--ink);border:1px solid var(--line2)}
.btn-add.alt:hover{border-color:var(--accent);box-shadow:none}

.stbadge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.stbadge .d{width:7px;height:7px;border-radius:50%}
.stbadge.active{background:rgba(62,207,142,.15);color:var(--green)}
.stbadge.resigned{background:rgba(255,107,107,.14);color:var(--red)}

/* asset row with inline action (employee modal) */
.asrow{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:var(--panel2);transition:.14s}
.asrow:hover{border-color:var(--line2)}
.asrow .ai{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex:0 0 32px}
.asrow .ai svg{width:17px;height:17px}
.asrow .info{flex:1;min-width:0;cursor:pointer}
.asrow .info .t{font-weight:600;font-size:13px}
.asrow .info .s{font-size:11.5px;color:var(--ink3)}
.asrow .act{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.btn-sm{padding:7px 12px;border-radius:9px;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-sm svg{width:14px;height:14px}
.btn-sm.danger{background:rgba(255,107,107,.13);color:var(--red);border:1px solid rgba(255,107,107,.28)}
.btn-sm.danger:hover{background:rgba(255,107,107,.22)}
.btn-sm.ghost{background:var(--panel);color:var(--ink2);border:1px solid var(--line2)}
.btn-sm.ghost:hover{color:var(--ink);border-color:var(--accent)}
.btn-sm.go{background:rgba(245,165,36,.14);color:var(--accent);border:1px solid rgba(245,165,36,.3)}
.btn-sm.go:hover{background:rgba(245,165,36,.22)}

/* member row (dept modal) */
.memrow{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:var(--panel2)}
.memrow .av{width:36px;height:36px;border-radius:9px;flex:0 0 36px;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;cursor:pointer}
.memrow .mi{flex:1;min-width:0;cursor:pointer}
.memrow .mi .t{font-weight:600;font-size:13px}
.memrow .mi .s{font-size:11.5px;color:var(--ink3)}

/* available-asset picker (allocate more) */
.pick-search{position:sticky;top:0;background:var(--panel);padding-bottom:10px;z-index:2}
.pick-search input{width:100%;padding:11px 13px 11px 38px;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;color:var(--ink);outline:none}
.pick-search input:focus{border-color:var(--accent)}
.pick-search .si{position:absolute;left:12px;top:11px;width:17px;height:17px;color:var(--ink3)}
.pick-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;cursor:pointer;transition:.13s}
.pick-item:hover{border-color:var(--accent);background:var(--panel2)}
.pick-item .pi{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:0 0 30px}
.pick-item .pi svg{width:16px;height:16px}
.pick-item .pt{flex:1;min-width:0}
.pick-item .pt .t{font-weight:600;font-size:13px}
.pick-item .pt .s{font-size:11.5px;color:var(--ink3)}
.pick-item .plus{color:var(--accent);font-weight:700}

/* export field checklist */
.ex-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ex-presets button{padding:7px 13px;border-radius:9px;font-weight:600;font-size:12.5px;background:var(--panel2);border:1px solid var(--line2);color:var(--ink2)}
.ex-presets button:hover{border-color:var(--accent);color:var(--ink)}
.ex-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 18px}
@media(max-width:600px){.ex-grid{grid-template-columns:1fr}}
.ex-chk{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:12.5px}
.ex-chk:hover{background:var(--panel2)}
.ex-chk input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.ex-group-h{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:14px 0 4px;grid-column:1/-1}
.ex-scope{display:flex;gap:8px;margin-bottom:6px}
.ex-scope label{flex:1;display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--line2);border-radius:10px;cursor:pointer;font-size:12.5px;font-weight:600}
.ex-scope label.sel{border-color:var(--accent);background:rgba(245,165,36,.08);color:var(--ink)}
.ex-count{font-size:12px;color:var(--ink3);font-weight:600}

.field-note{font-size:11.5px;color:var(--ink3);margin-top:-8px;margin-bottom:12px}
.locked-loc{background:var(--panel2);border:1px dashed var(--line2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--ink2);margin-bottom:6px;line-height:1.7}
.locked-loc b{color:var(--ink);font-weight:600}
.locked-loc .tagk{color:var(--accent);font-weight:700;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:4px}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.form-row2{grid-template-columns:1fr}}
.collapse-h{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:18px 0 10px;cursor:pointer}
.req{color:var(--red)}

/* ===== v3 additions ===== */
.subnav{display:flex;flex-direction:column;gap:2px;margin:2px 0 4px 4px;padding-left:8px;border-left:1px solid var(--line)}
.subitem{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--ink3);font-size:12.5px;font-weight:500;width:100%;text-align:left;transition:.14s}
.subitem:hover{background:var(--panel);color:var(--ink2)}
.subitem.active{background:rgba(245,165,36,.12);color:var(--ink)}
.subitem .sd{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.subitem .sc{margin-left:auto;font-size:11px;color:var(--ink3);font-weight:600}
.stsel{padding:6px 9px;border-radius:8px;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);font-size:12px;font-weight:600;outline:none;cursor:pointer;max-width:210px}
.stsel:focus{border-color:var(--accent)}
.dashfilter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.dashfilter .lbl{font-size:12px;color:var(--ink3);font-weight:600;margin-right:2px}
.dashfilter button{padding:7px 13px;border-radius:9px;font-weight:600;font-size:12.5px;background:var(--panel);border:1px solid var(--line2);color:var(--ink2);display:inline-flex;align-items:center;gap:7px}
.dashfilter button:hover{border-color:var(--accent);color:var(--ink)}
.dashfilter button.active{background:var(--accent);color:var(--accentink);border-color:var(--accent)}
.dashfilter button .sd{width:8px;height:8px;border-radius:50%}
.dept-asset-badge{display:inline-flex;align-items:center;gap:6px;color:var(--teal);font-weight:600;font-size:12px}
@keyframes hipulse{0%{background:rgba(245,165,36,.28)}100%{background:rgba(245,165,36,.10)}}
tr.row-hi td{background:rgba(245,165,36,.12);animation:hipulse 1.1s ease-out}
tr.row-hi td:first-child{box-shadow:inset 3px 0 0 var(--accent)}
.undo-btn{white-space:nowrap}
.cam-box{margin:12px 0;border:1px solid var(--line2);border-radius:12px;overflow:hidden;background:#000;position:relative}
.cam-box.flash{outline:3px solid var(--green);outline-offset:-3px}
#camReader{width:100%}
#camReader video{width:100%!important;display:block;border-radius:12px}
.cam-msg{font-size:12px;color:var(--ink3);padding:8px 4px;text-align:center}
.cam-frame{position:absolute;inset:14% 18%;border:2px solid rgba(245,165,36,.9);border-radius:10px;pointer-events:none;box-shadow:0 0 0 9999px rgba(0,0,0,.25)}
/* V5 */
.loader-screen{position:fixed;inset:0;z-index:200;display:none;place-items:center;background:rgba(13,15,20,.92);backdrop-filter:blur(4px)}
.loader-screen.show{display:grid}
.loader-card{display:flex;flex-direction:column;align-items:center;gap:18px}
.spinner{width:54px;height:54px;border-radius:50%;border:4px solid rgba(245,165,36,.2);border-top-color:var(--accent);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{color:var(--ink2);font-size:13.5px;font-weight:600;letter-spacing:.2px}
.icon-btn{width:42px;height:42px;flex:0 0 42px;border-radius:12px;background:var(--panel);border:1px solid var(--line2);color:var(--ink2);display:grid;place-items:center;cursor:pointer;transition:.15s}
.icon-btn:hover{color:var(--accent);border-color:var(--accent)}
.icon-btn svg{width:20px;height:20px}
.sync-chip{font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;white-space:nowrap}
.sync-chip.ok{background:rgba(60,200,120,.16);color:var(--green)}
.sync-chip.saving{background:rgba(245,165,36,.16);color:var(--accent)}
.sync-chip.err{background:rgba(255,107,107,.16);color:var(--red)}
.sync-chip.local{background:var(--panel2);color:var(--ink3)}
.sync-chip.empty{display:none}
.qr-card{border:1px solid var(--line2);border-radius:12px;padding:12px 14px;background:var(--panel2);display:flex;flex-direction:column;gap:4px}
.qr-card.notfound{border-color:rgba(255,107,107,.5)}
.qr-card .qcode{font-weight:700;font-size:15px}
.qr-card .qsub{font-size:12px;color:var(--ink3)}
.qr-card .qbtns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.menu-btn{display:grid}
.app.nav-collapsed .sidebar{display:none}
@media(max-width:760px){
  .icon-btn{width:40px;height:40px;flex-basis:40px}
  .topbar .sync-chip{display:none}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">ST</div>
      <div><h1>Quản lý Tài sản</h1><p>Công ty TNHH Sơn Tùng</p></div>
    </div>
    <nav class="nav">
      <div class="nav-label">Tổng quan</div>
      <button class="navitem active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Bảng điều khiển</button>
      <div class="nav-label">Dữ liệu</div>
      <button class="navitem" data-view="assets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 21h8M12 18v3"/></svg>
        Tài sản <span class="badge" id="badge-assets">0</span></button>
      <div class="subnav" id="statusSubnav"></div>
      <button class="navitem" data-view="employees">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.7-5 5.5-5s5.5 2 5.5 5"/><path d="M16 5.2a3 3 0 010 5.6M17.5 19c0-2.4-1.2-4-3-4.7"/></svg>
        Nhân viên <span class="badge" id="badge-emp">0</span></button>
      <button class="navitem" data-view="departments">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V8l6-4 6 4M9 21V11h6v10M15 21V10l6 4v7M3 21h18"/></svg>
        Phòng ban <span class="badge" id="badge-dept">0</span></button>
      <div class="nav-label">Công cụ</div>
      <button class="navitem" id="navScan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M6 8v8M9 8v8M12 8v8M15 8v8M18 8v8"/></svg>
        Thu hồi bằng mã vạch</button>
      <button class="navitem" id="navExport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M8 11l4 4 4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        Xuất Excel</button>
      <button class="navitem" id="navSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Cài đặt</button>
      <button class="navitem" id="navReset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9 9 0 00-6.4 2.6L3 8"/><path d="M3 4v4h4"/></svg>
        Đặt lại dữ liệu</button>
    </nav>
    <div class="side-foot">
      Dữ liệu nhập từ Snipe-IT<br>Thay đổi được lưu trên<br>trình duyệt này (localStorage).
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div class="search">
        <svg class="sicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="globalSearch" type="text" placeholder="Tìm theo mã tài sản hoặc tên người sử dụng…" autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
      <button class="icon-btn" id="qrScanBtn" title="Quét mã tài sản bằng camera"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v.01M21 17v4M17 21h4M14 21h.01"/></svg></button>
      <span class="sync-chip" id="syncChip" title="Trạng thái đồng bộ"></span>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="side-backdrop" id="sideBackdrop"></div>
<div class="loader-screen" id="loader"><div class="loader-card"><div class="spinner"></div><div class="loader-msg" id="loaderMsg">Đang tải dữ liệu…</div></div></div>
<div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg><span id="toastMsg"></span></div>

function typeIcon(t){ t=(t||'').toUpperCase(); const m={'THÙNG MÁY TÍNH':'pc','MÀN HÌNH':'mon','CHUỘT':'mouse','BÀN PHÍM':'kb','LAPTOP':'laptop','ĐIỆN THOẠI BÀN':'phone','SWITCH':'net','ROUTER WIFI':'wifi','SERVER':'server','MÁY IN TRẮNG ĐEN':'print','MÁY IN BARCODE':'print','MÁY IN BILL':'print','MÁY IN NHÃN VẢI':'print','MÁY IN A3':'print','ĐẦU GHI HÌNH':'cam','CAMERA':'cam','TIVI':'mon','MÁY QUÉT MÃ VẠCH':'scan'}; return ICONS[m[t]]||ICONS.box; }
function typeColor(t){ t=(t||'').toUpperCase(); if(t.includes('MÁY TÍNH')||t==='THÙNG MÁY TÍNH')return'var(--accent)'; if(t.includes('MÀN HÌNH')||t==='TIVI')return'var(--teal)'; if(t==='CHUỘT')return'var(--blue)'; if(t.includes('PHÍM'))return'var(--green)'; if(t.includes('IN'))return'#c084fc'; if(t.includes('SWITCH')||t.includes('WIFI')||t.includes('SERVER')||t.includes('ROUTER'))return'#ff8fab'; return'var(--amber)'; }

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function initials(n){ const p=(n||'?').trim().split(/\s+/); return ((p[0]?.[0]||'')+(p[p.length-1]?.[0]||'')).toUpperCase()||'?'; }
function avatarColor(n){ const h=[...(n||'')].reduce((a,c)=>a+c.charCodeAt(0),0)%360; return `hsl(${h} 55% 45%)`; }
function today(){ const d=new Date(),p=x=>String(x).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }

/* ===== employees ===== */
function employees(){
  const map=new Map();
  for(const a of assets()){
    if(!assignedToUser(a))continue;
    const k=ekey(a);
    if(!map.has(k))map.set(k,{key:k,name:user(a),username:uname(a),email:'',dept:dept(a),title:title(a),manager:(a.c31||'').trim(),status:'active',assets:[]});
    const e=map.get(k); if(!e.name)e.name=user(a); if(!e.dept)e.dept=dept(a); if(!e.title)e.title=title(a); e.assets.push(a);
  }
  for(const k in EMP_REG){ const r=EMP_REG[k];
    if(map.has(k)){ const e=map.get(k); if(r.name)e.name=r.name; if(r.username!==undefined)e.username=r.username; if(r.email!==undefined)e.email=r.email; if(r.dept)e.dept=r.dept; if(r.title)e.title=r.title; if(r.manager!==undefined)e.manager=r.manager; if(r.status)e.status=r.status; }
    else map.set(k,{key:k,name:r.name||k,username:r.username||'',email:r.email||'',dept:r.dept||'',title:r.title||'',manager:r.manager||'',status:r.status||'active',assets:[]});
  }
  return [...map.values()].sort((a,b)=>a.name.localeCompare(b.name,'vi'));
}
function empByKey(k){ return employees().find(e=>e.key===k); }

/* ===== departments ===== */
function departments(){
  const emps=employees(), as=assets(), names=new Set();
  as.forEach(a=>{ if(dept(a))names.add(dept(a)); }); emps.forEach(e=>{ if(e.dept)names.add(e.dept); }); DEPT_REG.forEach(d=>names.add(d));
  return [...names].map(n=>{
    const da=as.filter(a=>dept(a)===n);
    const deptAssets=da.filter(a=>assignedToDept(a));
    const members=emps.filter(e=>e.dept===n);
    return {name:n,assets:da,deptAssets,members,users:new Set(members.filter(m=>m.status!=='resigned').map(m=>m.key))};
  }).sort((a,b)=>b.assets.length-a.assets.length);
}

/* ===== migration v4: mọi nhân viên phải có phòng ban ===== */
function migrateV4(){
  if(localStorage.getItem(K_MIG))return;
  const emps=employees(); let moved=0;
  emps.forEach(e=>{ if(!e.dept){
    EMP_REG[e.key]=Object.assign({},EMP_REG[e.key],{name:e.name,username:e.username,email:e.email,dept:FALLBACK_DEPT,title:e.title,manager:e.manager,status:e.status});
    e.assets.forEach(a=>{ OVERRIDES[a.c2]=Object.assign({},OVERRIDES[a.c2],{c32:FALLBACK_DEPT}); }); moved++;
  }});
  if(moved){ if(!DEPT_REG.includes(FALLBACK_DEPT))DEPT_REG.push(FALLBACK_DEPT); save(K_EMP,EMP_REG); save(K_OV,OVERRIDES); save(K_DEPT,DEPT_REG); }
  localStorage.setItem(K_MIG,'1');
}

function defaultTypeFields(typeName){
  const base=['c1','c2','c3','c5','c4','c6','c7','c52','c53','c34','c12','c9','c46'];
  const t=(typeName||'').toUpperCase();
  const isComp=t.includes('MÁY TÍNH')||t==='LAPTOP'||t==='SERVER';
  const cfg=isComp?['c47','c48','c49','c50','c51','c63']:[];
  const ad=(t==='THÙNG MÁY TÍNH')?['anydesk']:[];
  return [...base.slice(0,10), ...cfg, ...ad, ...base.slice(10)];
}
function typeFields(typeName){ return (SETTINGS.typeFields && SETTINGS.typeFields[typeName]) ? SETTINGS.typeFields[typeName] : defaultTypeFields(typeName); }
function fieldDef(key){ return (SETTINGS.fieldDefs && SETTINGS.fieldDefs[key]) || {type:'text'}; }

/* ===================== ASSETS TABLE ===================== */
const PER=18;
function filteredAssets(){
  let arr=assets(); const q=STATE.assetQuery.trim().toLowerCase();
  if(q)arr=arr.filter(a=>tag(a).toLowerCase().includes(q)||user(a).toLowerCase().includes(q)||name(a).toLowerCase().includes(q)||uname(a).toLowerCase().includes(q));
  if(STATE.assetFilterType)arr=arr.filter(a=>type(a)===STATE.assetFilterType);
  if(STATE.assetFilterStatus)arr=arr.filter(a=>status(a)===STATE.assetFilterStatus);
  return arr;
}
function statusSelect(a){
  const cur=status(a); const t=esc(tag(a));
  let html=`<select class="stsel" data-stsel="${t}" style="color:${STCOLOR[cur]}">`;
  if(cur===ST.USING)html+=`<option value="${esc(ST.USING)}" selected disabled>${esc(ST.USING)} (đang cấp)</option>`;
  CANON.filter(s=>s!==ST.USING).forEach(s=>html+=`<option value="${esc(s)}" ${s===cur?'selected':''}>${esc(s)}</option>`);
  return html+'</select>';
}
function viewAssets(){
  const types=allTypes();
  let arr=filteredAssets();
  // highlight: nếu đang lọc theo 1 tình trạng, đưa tài sản vừa chuyển (chưa xem) lên đầu
  let hi=[];
  if(STATE.assetFilterStatus){
    hi=Object.keys(RECENT).filter(t=>{ const a=assetByTag(t); return a && !RECENT[t].seen && status(a)===STATE.assetFilterStatus; })
            .sort((x,y)=>RECENT[y].order-RECENT[x].order);
    const hiSet=new Set(hi);
    const rest=arr.filter(a=>!hiSet.has(tag(a)));
    const hiAssets=hi.map(assetByTag).filter(Boolean);
    arr=[...hiAssets,...rest];
  }
  const pages=Math.max(1,Math.ceil(arr.length/PER));
  if(STATE.assetPage>pages)STATE.assetPage=pages;
  const slice=arr.slice((STATE.assetPage-1)*PER,STATE.assetPage*PER);
  const opt=(v,l,sel)=>`<option value="${esc(v)}" ${sel?'selected':''}>${esc(l)}</option>`;
  const userCell=a=>{ if(assignedToUser(a))return `<div style="font-weight:600">${esc(user(a))}</div>`;
    if(assignedToDept(a))return `<span class="dept-asset-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M3 21V8l6-4 6 4M9 21V11h6v10"/></svg>Phòng: ${esc(dept(a))} (dùng chung)</span>`;
    return '<span class="muted">— Chưa cấp phát —</span>'; };
  const rows=slice.map(a=>{ const col=typeColor(type(a)); const t=tag(a); const isHi=STATE.assetFilterStatus&&RECENT[t]&&!RECENT[t].seen&&status(a)===STATE.assetFilterStatus;

    <td>${userCell(a)}</td>

  let pager='';

    <span class="count">${arr.length} tài sản</span>

  </table>${pager?`<div class="pager">${pager}</div>`:''}</div>`;

function fieldInput(key,value){

  return `<input id="${id}" data-fkey="${key}" value="${esc(value)}">`;

function readForm(scope){ const o={}; (scope||document).querySelectorAll('[data-fkey]').forEach(el=>{ o[el.dataset.fkey]=el.value.trim(); }); return o; }

/* ---- ASSET DETAIL ---- */

  const col=typeColor(type(a)); let body='';
  for(const [g,keys] of GROUPS){ const ks=keys.filter(k=>{ if(k==='anydesk')return isDesktop(a)&&getF(a,k); return a[k]&&String(a[k]).trim(); });
    const rows=ks.map(k=>frow(k,getF(a,k))).join(''); if(rows)body+=`<div class="fieldgroup"><div class="gh">${g}</div>${rows}</div>`; }
  let actions='', note='';
  if(assignedToUser(a)){ note=`Đang cấp cho <b style="color:#dce8ff">&nbsp;${esc(user(a))}</b>.`;
    actions=`<button class="btn btn-danger" onclick="openRecall('${esc(t)}','asset')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14l-5-5 5-5"/><path d="M4 9h11a5 5 0 015 5v1"/></svg>Thu hồi</button>`; }
  else if(assignedToDept(a)){ note=`Đang dùng chung tại phòng <b style="color:#dce8ff">&nbsp;${esc(dept(a))}</b>.`;
    actions=`<button class="btn btn-danger" onclick="recallDeptAsset('${esc(t)}','asset')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14l-5-5 5-5"/><path d="M4 9h11a5 5 0 015 5v1"/></svg>Thu hồi khỏi phòng</button>`; }
  else { note=`Tài sản <b style="color:#dce8ff">&nbsp;chưa được cấp phát</b>.`;
    actions=`${statusSelectDetail(t)}<button class="btn btn-primary" onclick="openAllocate('${esc(t)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 00-5 5v1"/></svg>Cấp phát</button>`; }
  showModal(`<div class="modal">
    <div class="modal-head"><div class="ic" style="background:${col}1f;color:${col}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${typeIcon(type(a))}</svg></div>
      <div class="ttl"><h3>${esc(name(a))}</h3><div class="sub"><span class="mono">${esc(tag(a))}</span> · ${esc(type(a))} ${statusChip(status(a))}</div></div>
      <button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn-sm ghost" onclick="openEditAsset('${esc(t)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>Chỉnh sửa tài sản</button>
        <button class="btn-sm danger" onclick="deleteAsset('${esc(t)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>Xóa tài sản</button></div>
      <div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>${note}</div>
      ${body}</div>

function statusSelectDetail(t){ const a=assetByTag(t); const cur=status(a);
  let html=`<select class="stsel" style="padding:11px 13px;color:${STCOLOR[cur]}" onchange="setStatus('${esc(t)}',this.value)">`;
  CANON.filter(s=>s!==ST.USING).forEach(s=>html+=`<option value="${esc(s)}" ${s===cur?'selected':''}>${esc(s)}</option>`); return html+'</select>'; }

/* ---- EDIT ASSET (tất cả trường) ---- */
function openEditAsset(t){
  const a=assetByTag(t); if(!a)return; let body='';
  for(const [g,keys] of GROUPS){ const ks=keys.filter(k=> k==='anydesk' ? isDesktop(a) : true ); if(!ks.length)continue;
    body+=`<div class="fieldgroup"><div class="gh">${g}</div><div class="form-row2">`;
    ks.forEach(k=>{ body+=`<div class="form-field"><label>${esc(LABELALL[k]||k)} ${k==='c2'?'<span class="req">*</span>':''}</label>${fieldInput(k,getF(a,k))}</div>`; });
    body+=`</div></div>`; }
  showModal(`<div class="modal">
    <div class="modal-head"><div class="ic" style="background:var(--accent)1f;color:var(--accent)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg></div>
      <div class="ttl"><h3>Chỉnh sửa tài sản</h3><div class="sub mono">${esc(t)}</div></div>
      <button class="x" onclick="openAsset('${esc(t)}')">×</button></div>
    <div class="modal-body" style="padding-top:14px">${body}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="openAsset('${esc(t)}')">Huỷ</button>
      <button class="btn btn-primary" onclick="saveEditAsset('${esc(t)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>Lưu thay đổi</button></div>
  </div>`);
}
function saveEditAsset(t){
  const a=assetByTag(t); if(!a)return; const o=readForm(overlay);
  const newTag=(o.c2||'').trim(); if(!newTag){ alert('Mã tài sản không được rỗng'); return; }
  if(newTag!==t && assets().some(x=>tag(x)===newTag)){ alert('Mã tài sản "'+newTag+'" đã tồn tại.'); return; }
  const patch={}; for(const k in o){ patch[k]=o[k]; } patch.c43=today();
  if(newTag!==t){ const merged=Object.assign({},a,patch,{c2:newTag}); const isNew=NEW_ASSETS.some(x=>x.c2===t);
    if(isNew){ NEW_ASSETS=NEW_ASSETS.map(x=>x.c2===t?merged:x); save(K_NEW,NEW_ASSETS); }
    else { NEW_ASSETS.push(merged); save(K_NEW,NEW_ASSETS); if(!DELETED.includes(t)){DELETED.push(t);save(K_DEL,DELETED);} }
    if(OVERRIDES[t]){ delete OVERRIDES[t]; save(K_OV,OVERRIDES); }
    render(); openAsset(newTag); toast('Đã lưu (đổi mã '+t+' → '+newTag+')'); return; }
  OVERRIDES[t]=Object.assign({},OVERRIDES[t],patch); save(K_OV,OVERRIDES); render(); openAsset(t); toast('Đã lưu thay đổi tài sản '+t);
}
function deleteAsset(t){ const a=assetByTag(t); if(!a)return;
  if(!confirm(`Xóa hoàn toàn tài sản ${t} (${name(a)}) khỏi ứng dụng?\nKhông thể hoàn tác (trừ khi Đặt lại dữ liệu).`))return;
  if(NEW_ASSETS.some(x=>x.c2===t)){ NEW_ASSETS=NEW_ASSETS.filter(x=>x.c2!==t); save(K_NEW,NEW_ASSETS); }
  else if(!DELETED.includes(t)){ DELETED.push(t); save(K_DEL,DELETED); }
  if(OVERRIDES[t]){ delete OVERRIDES[t]; save(K_OV,OVERRIDES); } delete RECENT[t];
  closeModal(); render(); toast('Đã xóa tài sản '+t);
}

/* ---- change status (highlight + undo) ---- */
function setStatus(t,ns){
  const a=assetByTag(t); if(!a)return; if(ns===ST.USING){ render(); return; }
  const snapshot=OVERRIDES[t]?JSON.parse(JSON.stringify(OVERRIDES[t])):null;
  if(inUse(a)){ const who=assignedToUser(a)?('"'+user(a)+'"'):('phòng "'+dept(a)+'"');
    if(!confirm(`Tài sản đang dùng bởi ${who}. Đổi tình trạng sẽ thu hồi khỏi nơi đang dùng. Tiếp tục?`)){ render(); if(overlay.classList.contains('show'))openAsset(t); return; }
    OVERRIDES[t]=Object.assign({},OVERRIDES[t],{c27:'',c28:'',c29:'',c30:'',c31:'',c32:'',c33:'',_deptAssigned:false,c34:ns,c40:'',c43:today()});
  } else OVERRIDES[t]=Object.assign({},OVERRIDES[t],{c34:ns,c43:today()});
  save(K_OV,OVERRIDES); RECENT[t]={prevOverride:snapshot,order:++ORDER,seen:false};
  closeModal(); STATE.view='assets'; STATE.assetFilterStatus=ns; STATE.assetFilterType=''; STATE.assetQuery=''; STATE.assetPage=1;
  syncNav(); render(); toast('Đã đổi → '+ns+' · bấm “Hoàn lại” nếu nhầm');
}
function undoStatus(t){ const r=RECENT[t]; if(!r)return;
  if(r.prevOverride===null){ delete OVERRIDES[t]; } else { OVERRIDES[t]=r.prevOverride; }
  save(K_OV,OVERRIDES); delete RECENT[t]; const a=assetByTag(t); render(); toast('Đã hoàn lại '+t+(a?(' → '+status(a)):'')); }

function confirmAllocate(t){
  if(allocMode==='new'){ const nm=document.getElementById('alName').value.trim(); if(!nm){ alert('Nhập họ tên'); return; }
    const un=document.getElementById('alUser').value.trim(), dp=document.getElementById('alDept').value.trim(), ti=document.getElementById('alTitle').value.trim();
    if(!dp){ alert('Nhân viên bắt buộc phải có phòng ban'); return; }
    const k=un||nm; EMP_REG[k]=Object.assign({},EMP_REG[k],{name:nm,username:un,dept:dp,title:ti,status:'active'}); save(K_EMP,EMP_REG);
    if(!allDepts().includes(dp)){ DEPT_REG.push(dp); save(K_DEPT,DEPT_REG); }
    applyAllocate(t,{c27:nm,c28:'user',c29:un,c32:dp,c33:ti}); render(); toast('Đã cấp '+t+' cho '+nm); allocBack(t); }
  else if(allocMode==='dept'){ const dp=document.getElementById('alDeptName').value.trim(); if(!dp){ alert('Chọn phòng ban'); return; }

    render(); toast('Đã cấp '+t+' cho phòng '+dp); allocBack(t); }
}

/* recall */
function openRecall(t,ret){ const a=assetByTag(t); if(!a)return;
  showModal(`<div class="modal" style="max-width:520px">
    <div class="modal-head"><div class="ic" style="background:rgba(255,107,107,.14);color:var(--red)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14l-5-5 5-5"/><path d="M4 9h11a5 5 0 015 5v1"/></svg></div>
      <div class="ttl"><h3>Thu hồi tài sản</h3><div class="sub"><span class="mono">${esc(tag(a))}</span> · từ ${esc(user(a))}</div></div>
      <button class="x" onclick="backFrom('${esc(ret)}','${esc(t)}')">×</button></div>
    <div class="modal-body" style="padding-top:18px"><div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>Chọn hình thức thu hồi:</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-primary" style="justify-content:flex-start" onclick="doRecall('${esc(t)}','${esc(ret)}')">Thu hồi tài sản (về kho chờ cấp phát)</button>
        <button class="btn btn-danger" style="justify-content:flex-start" onclick="doRecallBroken('${esc(t)}')">Tài sản hỏng — thu hồi & cấp thiết bị khác</button></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="backFrom('${esc(ret)}','${esc(t)}')">Huỷ</button></div>
  </div>`);
}
function backFrom(ret,t){ if(ret==='asset')openAsset(t); else if(ret&&ret.startsWith('emp:'))openEmployee(ret.slice(4)); else closeModal(); }
function clearAssign(t,ns){ OVERRIDES[t]=Object.assign({},OVERRIDES[t],{c27:'',c28:'',c29:'',c30:'',c31:'',c32:'',c33:'',_deptAssigned:false,c34:ns,c40:'',c43:today()}); }
function doRecall(t,ret){ clearAssign(t,ST.WAIT); save(K_OV,OVERRIDES); render(); toast('Đã thu hồi '+t); backFrom(ret,t); }
function doRecallBroken(t){ const a=assetByTag(t); const k=ekey(a); const e=empByKey(k);
  if(e)EMP_REG[k]=Object.assign({},EMP_REG[k],{name:e.name,username:e.username,email:e.email,dept:e.dept,title:e.title,status:e.status});
  save(K_EMP,EMP_REG); clearAssign(t,ST.BROKEN); save(K_OV,OVERRIDES); render(); toast('Đã đánh dấu hỏng & thu hồi '+t);
  if(e)openAllocateMore(k,true); else closeModal(); }
function recallDeptAsset(t,ret){ const a=assetByTag(t); if(!a)return;
  if(!confirm(`Thu hồi tài sản dùng chung ${t} khỏi phòng "${dept(a)}"?`))return;
  clearAssign(t,ST.WAIT); save(K_OV,OVERRIDES); render(); toast('Đã thu hồi '+t);
  if(ret==='asset')openAsset(t); else if(ret&&ret.startsWith('dept:'))openDept(ret.slice(5)); }
/* thu hồi nhanh ngay trên danh sách tài sản */
function quickRecall(t){ const a=assetByTag(t); if(!a)return;
  const who=assignedToUser(a)?(' từ "'+user(a)+'"'):(assignedToDept(a)?(' khỏi phòng "'+dept(a)+'"'):'');
  if(!confirm(`Thu hồi nhanh ${t}${who}?\nTài sản sẽ chuyển về “Đang chờ cấp phát”.`))return;
  clearAssign(t,ST.WAIT); save(K_OV,OVERRIDES); render(); toast('Đã thu hồi '+t); }

    <div class="info" onclick="openAsset('${esc(tag(a))}')"><div class="t">${esc(name(a))} <span class="muted" style="font-weight:500">(${esc(type(a))})</span></div><div class="s"><span class="mono">${esc(tag(a))}</span> · ${esc(status(a))}</div></div>
    <div class="act"><button class="btn-sm danger" onclick="openRecall('${esc(tag(a))}','emp:${esc(key)}')">Thu hồi</button></div></div>`; }).join('')

  else if(e.status==='resigned')statusBtns=`<button class="btn btn-ghost" onclick="reactivateEmp('${esc(key)}')">Khôi phục làm việc</button><button class="btn btn-danger" onclick="openReallocate('${esc(key)}','delete')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>Xóa nhân viên</button>`;
  else statusBtns=`<button class="btn btn-danger" onclick="openResign('${esc(key)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 17l5-5-5-5M21 12H9M12 19v1a2 2 0 01-2 2H5a2 2 0 01-2-2V4a2 2 0 012-2h5a2 2 0 012 2v1"/></svg>Nghỉ việc</button>`;
  showModal(`<div class="modal" style="max-width:700px">

function reallocRecallAll(key,mode){ const e=empByKey(key); if(!e)return; e.assets.forEach(a=>clearAssign(tag(a),ST.WAIT)); save(K_OV,OVERRIDES); render(); openReallocate(key,mode); }

function rsMode(m){ rsModeV=m; document.getElementById('rsEx').classList.toggle('active',m==='existing'); document.getElementById('rsNew').classList.toggle('active',m==='new'); document.getElementById('rsExisting').classList.toggle('hide',m!=='existing'); document.getElementById('rsNewBox').classList.toggle('hide',m!=='new'); }
function confirmReassign(all){ let target;
  if(rsModeV==='existing'){ target=empByKey(document.getElementById('rsSelect').value); if(!target){ alert('Chưa chọn nhân viên'); return; } }
  else { const nm=document.getElementById('rsName').value.trim(); if(!nm){ alert('Nhập họ tên'); return; } const un=document.getElementById('rsUser').value.trim(), dp=document.getElementById('rsDept').value.trim(), ti=document.getElementById('rsTitle').value.trim();
    if(!dp){ alert('Phòng ban bắt buộc'); return; } const k=un||nm; EMP_REG[k]=Object.assign({},EMP_REG[k],{name:nm,username:un,dept:dp,title:ti,status:'active'}); save(K_EMP,EMP_REG);
    if(!allDepts().includes(dp)){DEPT_REG.push(dp);save(K_DEPT,DEPT_REG);} target={key:k,name:nm,username:un,dept:dp,title:ti}; }
  const src=empByKey(reTarget.key); const tags=all?src.assets.map(tag):[reTarget.tag];
  tags.forEach(t=>applyAllocate(t,{c27:target.name,c28:'user',c29:target.username,c32:target.dept,c33:target.title})); save(K_OV,OVERRIDES);
  render(); openReallocate(reTarget.key,reTarget.mode); }

/* member <-> department */

  e.assets.forEach(a=>{ OVERRIDES[a.c2]=Object.assign({},OVERRIDES[a.c2],{c27:'',c28:'',c29:'',c30:'',c31:'',c32:dn,c33:'',_deptAssigned:true,c34:ST.USING,c43:today()}); });

  d.deptAssets.forEach(a=>{ OVERRIDES[a.c2]=Object.assign({},OVERRIDES[a.c2],{c27:name,c28:'user',c29:'',c32:FALLBACK_DEPT,c33:'',_deptAssigned:false,c34:ST.USING,c43:today()}); });

  const da=d.deptAssets.length? d.deptAssets.map(a=>`<div class="asrow"><div class="ai" style="background:${typeColor(type(a))}1f;color:${typeColor(type(a))}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${typeIcon(type(a))}</svg></div>

/* xóa phòng ban */
function deleteDeptFlow(dname){
  const d=departments().find(x=>x.name===dname); if(!d)return;
  if(d.members.length){ alert(`Phòng “${dname}” vẫn còn ${d.members.length} thành viên (kể cả đã nghỉ việc).\nVui lòng kiểm tra & xử lý thành viên trước khi xóa phòng.`); return; }
  if(d.assets.length){ // còn tài sản: hiện danh sách để chuyển/thu hồi
    const otherDepts=allDepts().filter(x=>x!==dname);
    const list=d.assets.map(a=>`<div class="asrow"><div class="ai" style="background:${typeColor(type(a))}1f;color:${typeColor(type(a))}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${typeIcon(type(a))}</svg></div>
      <div class="info"><div class="t">${esc(name(a))}</div><div class="s mono">${esc(tag(a))}</div></div>
      <div class="act"><select class="stsel" id="mv_${esc(tag(a))}" style="max-width:150px"><option value="">→ chuyển phòng…</option>${otherDepts.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join('')}</select>
        <button class="btn-sm go" onclick="moveDeptAsset('${esc(dname)}','${esc(tag(a))}')">Chuyển</button>
        <button class="btn-sm danger" onclick="recallDeptAssetFlow('${esc(dname)}','${esc(tag(a))}')">Thu hồi</button></div></div>`).join('');
    showModal(`<div class="modal" style="max-width:640px">
      <div class="modal-head"><div class="ic" style="background:var(--amber)1f;color:var(--amber)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg></div>
        <div class="ttl"><h3>Phòng “${esc(dname)}” còn ${d.assets.length} tài sản</h3><div class="sub">Hãy chuyển hoặc thu hồi hết trước khi xóa</div></div>
        <button class="x" onclick="openDept('${esc(dname)}')">×</button></div>
      <div class="modal-body" style="padding-top:14px"><div class="fieldgroup"><div class="gh">Tài sản của phòng (${d.assets.length})</div>${list}</div></div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="openDept('${esc(dname)}')">Đóng</button>
        <button class="btn btn-danger" onclick="recallAllDeptAssets('${esc(dname)}')">Thu hồi toàn bộ tài sản</button></div>
    </div>`); return;
  }
  // đủ điều kiện xóa
  if(confirm(`Xóa phòng ban “${dname}”?`)){ DEPT_REG=DEPT_REG.filter(x=>x!==dname); save(K_DEPT,DEPT_REG); closeModal(); render(); toast('Đã xóa phòng ban '+dname); }
}
function moveDeptAsset(dname,t){ const sel=document.getElementById('mv_'+t); const nd=sel?sel.value:''; if(!nd){ alert('Chọn phòng ban đích'); return; }

function styleRange(ws,r1,c1,r2,c2,style){ for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){ const ref=XLSX.utils.encode_cell({r,c}); if(!ws[ref])ws[ref]={t:'s',v:''}; ws[ref].s=Object.assign({},ws[ref].s,style); } }
function exportMonthly(){
  const M=new Date().getMonth()+1, Y=new Date().getFullYear();
  const data=reportRows(); const N=data.length;
  const TNR={name:'Times New Roman',sz:13};
  const thin={style:'thin',color:{rgb:'000000'}}; const border={top:thin,bottom:thin,left:thin,right:thin};
  const cols=[{wch:7.8},{wch:20},{wch:31.2},{wch:16.4},{wch:15.8},{wch:18.9},{wch:8.3},{wch:29},{wch:59.4}];
  const headers=['STT','Công ty','Tên tài sản','Thẻ tài sản','Sê-ri','Đã checkout','Loại','Tình trạng','Ghi chú'];
  // 1) sheet báo cáo (tiêu đề + header + data)
  const aoa1=[['TÀI SẢN CÔNG TY SƠN TÙNG'],headers,...data];
  const ws1=XLSX.utils.aoa_to_sheet(aoa1); ws1['!cols']=cols; ws1['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}}];
  ws1['A1'].s={font:{name:'Times New Roman',sz:13,bold:true},fill:{fgColor:{rgb:'92D050'}},alignment:{horizontal:'center',vertical:'center'}};
  styleRange(ws1,1,0,1,8,{font:{name:'Times New Roman',sz:13,bold:true},fill:{fgColor:{rgb:'FFFF00'}},alignment:{horizontal:'center',vertical:'center'},border});
  styleRange(ws1,2,0,N+1,8,{font:TNR,border,alignment:{vertical:'center',wrapText:false}});
  // 2) sheet SONTUNG (dữ liệu thô cho COUNTIFS)
  const aoa3=[headers,...data]; const ws3=XLSX.utils.aoa_to_sheet(aoa3); ws3['!cols']=cols;
  styleRange(ws3,0,0,0,8,{font:{name:'Times New Roman',sz:13,bold:true},fill:{fgColor:{rgb:'FFFF00'}}});
  styleRange(ws3,1,0,N,8,{font:TNR});
  // 3) sheet THỐNG KÊ (COUNTIFS theo SONTUNG)
  const last=N+1; // hàng cuối dữ liệu trong SONTUNG (header ở hàng 1)
  const cif=(names,st)=>names.map(nm=>`COUNTIFS(SONTUNG!$C$2:$C$${last},"${nm}",SONTUNG!$H$2:$H$${last},"${st}")`).join('+');
  const types=[['Server',['SERVER']],['PC',['MÁY TÍNH BÀN']],['Màn hình',['MÀN HÌNH']],['Bàn phím',['BÀN PHÍM']],
    ['Chuột máy tính',['CHUỘT']],['Laptop',['LAPTOP']],['Máy in A4',['MÁY IN THƯỜNG','MÁY IN MÀU','MÁY IN ĐA CHỨC NĂNG']],
    ['Máy in nhãn',['MÁY IN NHÃN VẢI']],['Máy in code',['MÁY IN BARCODE']],['Máy quét mã vạch',['MÁY QUÉT MÃ VẠCH']],
    ['Máy chiếu',['MÁY CHIẾU']],['Điện thoại bàn',['ĐIỆN THOẠI BÀN']],['Tổng đài',['TỔNG ĐÀI ĐIỆN THOẠI']],
    ['Firewall',['FIREWALL']],['Switch',['SWITCH']]];
  const aoa2=[['BẢNG THỐNG KÊ'],['STT','Tên tài sản','Số lượng đã cấp phát','Số lượng chờ cấp phát','Đơn vị','Ghi chú']];
  types.forEach((row,i)=>aoa2.push([i+1,row[0],{f:cif(row[1],'CẤP PHÁT (deployed)')},{f:cif(row[1],'CẤP PHÁT (deployable)')},'Cái','']));
  const ws2=XLSX.utils.aoa_to_sheet(aoa2); ws2['!cols']=[{wch:4.7},{wch:15.8},{wch:19.1},{wch:20.1},{wch:6.7},{wch:60}]; ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:5}}];
  ws2['A1'].s={font:{name:'Times New Roman',sz:13,bold:true},fill:{fgColor:{rgb:'D9E1F2'}},alignment:{horizontal:'center'}};
  styleRange(ws2,1,0,1,5,{font:{name:'Times New Roman',sz:13,bold:true},fill:{fgColor:{rgb:'FFFF00'}},border,alignment:{horizontal:'center',vertical:'center',wrapText:true}});
  styleRange(ws2,2,0,types.length+1,5,{font:TNR,border});
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws1,'TÀI SẢN SONTUNG T'+M);
  XLSX.utils.book_append_sheet(wb,ws2,'THỐNG KÊ T'+M);
  XLSX.utils.book_append_sheet(wb,ws3,'SONTUNG');
  XLSX.writeFile(wb,'Bao_cao_tai_san_T'+M+'_'+Y+'.xlsx');
  closeModal(); toast('Đã xuất báo cáo tháng '+M+'/'+Y+' ('+N+' tài sản)');
}

/* ===================== RESET ===================== */
function resetData(){
  if(!confirm('Đặt lại toàn bộ thay đổi (cấp phát, thu hồi, đổi tình trạng, tài sản/nhân viên/phòng ban đã thêm/xóa, nghỉ việc, chuyển phòng, cài đặt)?\n\nDữ liệu gốc trên Google Sheet sẽ được giữ nguyên.'))return;
  [K_OV,K_NEW,K_EMP,K_DEPT,K_DEL,K_SET,K_MIG].forEach(k=>localStorage.removeItem(k));
  OVERRIDES={}; NEW_ASSETS=[]; EMP_REG={}; DEPT_REG=[]; DELETED=[]; SETTINGS={typeFields:{},fieldDefs:{}}; RECENT={};
  migrateV4(); scheduleSync(); closeModal(); setView('dashboard'); toast('Đã đặt lại về dữ liệu gốc');
}

/* ===================== GLOBAL SEARCH + HOTKEY ===================== */
const gs=document.getElementById('globalSearch'), sr=document.getElementById('searchResults');
function searchMatches(q){ q=q.trim().toLowerCase();
  const aMatch=q?assets().filter(a=>tag(a).toLowerCase().includes(q)||name(a).toLowerCase().includes(q)).slice(0,8):[];
  const eMatch=q?employees().filter(e=>e.name.toLowerCase().includes(q)||e.username.toLowerCase().includes(q)).slice(0,6):[];
  return {aMatch,eMatch}; }
gs.addEventListener('input',()=>{ const q=gs.value.trim(); if(!q){ sr.classList.remove('show'); sr.innerHTML=''; return; }
  const {aMatch,eMatch}=searchMatches(q); let html='';
  if(eMatch.length)html+='<div class="sr-group">Người sử dụng</div>'+eMatch.map(e=>`<div class="sr-item" data-emp="${esc(e.key)}"><span class="dot" style="background:${avatarColor(e.name)}"></span><div><div class="t">${esc(e.name)}</div><div class="s">${esc(e.dept||'—')} · ${e.assets.length} tài sản · ${ESLABEL[e.status]||''}</div></div></div>`).join('');
  if(aMatch.length)html+='<div class="sr-group">Tài sản</div>'+aMatch.map(a=>{ const c=typeColor(type(a)); return `<div class="sr-item" data-tag="${esc(tag(a))}"><span class="dot" style="background:${c}"></span><div><div class="t"><span class="mono">${esc(tag(a))}</span> · ${esc(name(a))}</div><div class="s">${esc(type(a))} · ${esc(status(a))}</div></div></div>`; }).join('');
  if(!html)html='<div class="sr-empty">Không tìm thấy kết quả cho "'+esc(gs.value)+'"</div>'; sr.innerHTML=html; sr.classList.add('show'); });
gs.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const q=gs.value.trim(); if(!q)return; const {aMatch,eMatch}=searchMatches(q);
  if(eMatch.length)openEmployee(eMatch[0].key); else if(aMatch.length)openAsset(tag(aMatch[0])); else return; sr.classList.remove('show'); gs.value=''; gs.blur(); } });
sr.addEventListener('click',e=>{ const a=e.target.closest('[data-tag]'), em=e.target.closest('[data-emp]'); if(a)openAsset(a.dataset.tag); else if(em)openEmployee(em.dataset.emp); sr.classList.remove('show'); gs.value=''; });
document.addEventListener('click',e=>{ if(!e.target.closest('.search'))sr.classList.remove('show'); });
/* Alt + Space mở ô tìm kiếm */
document.addEventListener('keydown',e=>{ if(e.altKey && (e.code==='Space'||e.key===' ')){ e.preventDefault(); gs.focus(); gs.select(); } });

/* ===================== THU HỒI BẰNG MÁY QUÉT MÃ VẠCH ===================== */
let SCAN_LOG=[]; let QR_LOG=[]; let SCAN_CTX='recall';
function handleScan(code){ if(SCAN_CTX==='qr')processQrCode(code); else processScanCode(code); }
function openScanRecall(){
  SCAN_CTX='recall';
  showModal(`<div class="modal" style="max-width:640px">
    <div class="modal-head"><div class="ic" style="background:var(--accent)1f;color:var(--accent)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M6 8v8M9 8v8M12 8v8M15 8v8M18 8v8"/></svg></div>
      <div class="ttl"><h3>Thu hồi bằng máy quét mã vạch</h3><div class="sub">Quét liên tục: quét → tự thu hồi → ô tự trống để quét tiếp</div></div>
      <button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body" style="padding-top:18px">
      <div class="form-field"><label>Quét hoặc nhập mã tài sản (tự xử lý khi quét/nhấn Enter)</label>
        <input id="scanInput" autocomplete="off" placeholder="Đang chờ quét mã…" style="font-size:17px;padding:14px;letter-spacing:.04em;font-family:var(--mono,monospace)"></div>
      <button class="btn-add alt" id="camToggleBtn" style="width:100%;justify-content:center;margin-bottom:10px" onclick="toggleCam()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8a2 2 0 012-2h2l1.5-2h7L17 6h2a2 2 0 012 2v9a2 2 0 01-2 2H4a2 2 0 01-2-2z"/><circle cx="12" cy="12.5" r="3.2"/></svg>Quét bằng camera điện thoại</button>
      <div id="camBox" class="cam-box hide"><div id="camReader"></div><div class="cam-frame"></div></div>
      <div id="camMsg" class="cam-msg"></div>
      <div style="display:flex;gap:12px;align-items:center;margin:2px 0 14px">
        <span class="ex-count">Đã thu hồi trong phiên: <b id="scanCount" style="color:var(--green);font-size:14px">0</b></span>
        <button class="btn-sm ghost" style="margin-left:auto" onclick="clearScanLog()">Xóa nhật ký</button></div>
      <div id="scanLog" style="display:flex;flex-direction:column;gap:7px;max-height:360px;overflow:auto"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Đóng</button></div>
  </div>`);
  const inp=document.getElementById('scanInput');
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); processScan(); } });
  renderScanLog(); setTimeout(()=>inp.focus(),60);
}
function processScan(){
  const inp=document.getElementById('scanInput'); if(!inp)return;
  const code=inp.value.trim(); inp.value=''; inp.focus();
  handleScan(code);
}
function processScanCode(code){
  if(!code)return;
  let a=assetByTag(code);
  if(!a){ const lc=code.toLowerCase(); a=assets().find(x=>tag(x).toLowerCase()===lc); }
  if(!a){ SCAN_LOG.unshift({kind:'notfound',code,msg:'Không tìm thấy mã tài sản này',time:nowhms()}); renderScanLog(); return; }
  if(inUse(a)){
    const who=assignedToUser(a)?('từ '+user(a)):(assignedToDept(a)?('khỏi phòng '+dept(a)):'');
    clearAssign(tag(a),ST.WAIT); save(K_OV,OVERRIDES);
    SCAN_LOG.unshift({kind:'ok',code:tag(a),aname:name(a),msg:'Đã thu hồi '+who+' · '+name(a),time:nowhms()});
    render(); renderScanLog();
  } else {
    SCAN_LOG.unshift({kind:'already',code:tag(a),aname:name(a),msg:'Tài sản đã được thu hồi trước đó (tình trạng: '+status(a)+')',time:nowhms()});
    renderScanLog();
  }
}
/* ----- Camera quét mã ----- */
let camScanner=null, camRunning=false, lastDecoded='', lastDecodedAt=0;
function toggleCam(){ if(camRunning)stopCam(); else startCam(); }
function startCam(){
  const msg=document.getElementById('camMsg'); const box=document.getElementById('camBox'); const btn=document.getElementById('camToggleBtn');
  if(typeof Html5Qrcode==='undefined'){ if(msg)msg.textContent='Thiếu thư viện quét. Hãy tải lại file.'; return; }
  if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){ if(msg)msg.textContent='Trình duyệt không hỗ trợ camera, hoặc trang không chạy ở chế độ an toàn (https / mở file trực tiếp).'; return; }
  box.classList.remove('hide'); if(msg)msg.textContent='Đang mở camera… cho phép quyền truy cập nếu được hỏi.';
  camScanner=new Html5Qrcode('camReader',{verbose:false});
  var fmts=null;
  if(typeof Html5QrcodeSupportedFormats!=='undefined'){
    var F=Html5QrcodeSupportedFormats;
    fmts=[F.CODE_128,F.CODE_39,F.CODE_93,F.CODABAR,F.ITF,F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E,F.QR_CODE];
  }
  const config={
    fps:15,
    aspectRatio:1.33,
    qrbox:function(w,h){ const bw=Math.floor(Math.min(w,h)*0.92); const bh=Math.floor(bw*0.42); return {width:bw,height:bh}; },
    experimentalFeatures:{useBarCodeDetectorIfSupported:true}
  };
  if(fmts)config.formatsToSupport=fmts;
  camScanner.start({facingMode:'environment'},config,onCamDecode,function(){}).then(function(){
    camRunning=true; if(btn)btn.textContent='Tắt camera'; if(msg)msg.textContent='Đưa mã tài sản vào khung để quét (sẽ kêu bíp khi nhận).';
  }).catch(function(err){
    if(msg)msg.textContent='Không mở được camera: '+err+'. Cần cấp quyền camera và chạy ở chế độ an toàn (https hoặc mở file .html trực tiếp).';
    box.classList.add('hide'); camScanner=null; camRunning=false;
  });
}
function stopCam(){
  const box=document.getElementById('camBox'), btn=document.getElementById('camToggleBtn'), msg=document.getElementById('camMsg');
  const sc=camScanner; camRunning=false; camScanner=null;
  if(btn)btn.textContent='Quét bằng camera điện thoại'; if(box)box.classList.add('hide'); if(msg)msg.textContent='';
  if(sc){ try{ sc.stop().then(function(){ try{sc.clear();}catch(e){} }).catch(function(){}); }catch(e){} }
}
function onCamDecode(text){
  const now=Date.now(); const code=(text||'').trim();
  if(code===lastDecoded && now-lastDecodedAt<1600)return;
  lastDecoded=code; lastDecodedAt=now;
  beep(); flashCam();
  handleScan(code);
}
function flashCam(){ const box=document.getElementById('camBox'); if(!box)return; box.classList.add('flash'); setTimeout(function(){ box.classList.remove('flash'); },350); }
function beep(){ try{ const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx)return; const ac=new Ctx(); const o=ac.createOscillator(),g=ac.createGain();
  o.type='square'; o.frequency.value=880; o.connect(g); g.connect(ac.destination); g.gain.setValueAtTime(0.06,ac.currentTime);
  o.start(); o.stop(ac.currentTime+0.12); setTimeout(function(){ try{ac.close();}catch(e){} },300); }catch(e){} }
function nowhms(){ const t=new Date(),p=x=>String(x).padStart(2,'0'); return p(t.getHours())+':'+p(t.getMinutes())+':'+p(t.getSeconds()); }
function renderScanLog(){
  const log=document.getElementById('scanLog'); if(!log)return;
  const sc=document.getElementById('scanCount'); if(sc)sc.textContent=SCAN_LOG.filter(e=>e.kind==='ok').length;
  log.innerHTML=SCAN_LOG.map(e=>{
    const col=e.kind==='ok'?'var(--green)':e.kind==='already'?'var(--amber)':'var(--red)';
    const icon=e.kind==='ok'?'<path d="M20 6L9 17l-5-5"/>':e.kind==='already'?'<circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/>':'<circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/>';
    // chỉ tài sản vừa thu hồi (ok) và hiện đang trống mới cho cấp phát
    let allocBtn='';
    if(e.kind==='ok'){ const cur=assetByTag(e.code); if(cur && available(cur)) allocBtn=`<button class="btn-sm go" onclick="allocateFromScan('${esc(e.code)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 00-5 5"/></svg>Cấp phát</button>`;
      else if(cur) allocBtn=`<span class="muted" style="font-size:11px">đã cấp lại</span>`; }
    return `<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid ${col}44;background:${col}14;border-radius:9px">
      <svg viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2" style="width:18px;height:18px;flex:0 0 18px">${icon}</svg>
      <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px"><span class="mono">${esc(e.code)}</span></div><div style="font-size:11.5px;color:var(--ink3)">${esc(e.msg)}</div></div>
      ${allocBtn}<span style="font-size:11px;color:var(--ink3)" class="mono">${esc(e.time)}</span></div>`;
  }).join('');
}
function allocateFromScan(t){ if(camRunning)stopCam(); openAllocate(t,'scan'); }
function clearScanLog(){ SCAN_LOG=[]; renderScanLog(); const inp=document.getElementById('scanInput'); if(inp)inp.focus(); }

/* ===================== QUÉT QR (camera điện thoại) — hiện thông tin + thao tác ===================== */
function openQrScan(){
  SCAN_CTX='qr';
  showModal(`<div class="modal" style="max-width:600px">
    <div class="modal-head"><div class="ic" style="background:var(--accent)1f;color:var(--accent)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v4M17 21h4M14 21h.01"/></svg></div>
      <div class="ttl"><h3>Quét mã tài sản bằng camera</h3><div class="sub">Quét xong sẽ hiện thông tin & nút thao tác (không tự thu hồi)</div></div>
      <button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body" style="padding-top:16px">
      <div id="camBox" class="cam-box"><div id="camReader"></div><div class="cam-frame"></div></div>
      <div id="camMsg" class="cam-msg"></div>
      <div class="form-field"><label>Hoặc nhập / quét bằng máy quét mã vạch</label>
        <input id="scanInput" autocomplete="off" placeholder="Nhập mã rồi Enter…" style="font-size:15px;padding:12px;font-family:var(--mono,monospace)"></div>
      <div style="display:flex;gap:12px;align-items:center;margin:2px 0 12px"><span class="ex-count">Đã quét: <b id="qrCount" style="font-size:14px">0</b></span><button class="btn-sm ghost" style="margin-left:auto" onclick="clearQrLog()">Xóa nhật ký</button></div>
      <div id="qrLog" style="display:flex;flex-direction:column;gap:9px;max-height:340px;overflow:auto"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Đóng</button></div>
  </div>`);
  const inp=document.getElementById('scanInput');
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); processScan(); } });
  renderQrLog(); startCam();
}
function processQrCode(code){
  code=(code||'').trim(); if(!code)return;
  let a=assetByTag(code);
  if(!a){ const lc=code.toLowerCase(); a=assets().find(x=>tag(x).toLowerCase()===lc); }
  if(!a){ QR_LOG.unshift({found:false,code:code,time:nowhms()}); renderQrLog(); return; }
  QR_LOG.unshift({found:true,code:tag(a),time:nowhms()}); renderQrLog();
}
function renderQrLog(){
  const log=document.getElementById('qrLog'); if(!log)return;
  const qc=document.getElementById('qrCount'); if(qc)qc.textContent=QR_LOG.length;
  log.innerHTML=QR_LOG.map(e=>{
    if(!e.found) return `<div class="qr-card notfound"><div class="qcode" style="color:var(--red)"><span class="mono">${esc(e.code)}</span></div><div class="qsub">Không tìm thấy mã tài sản này</div><div class="qsub mono" style="opacity:.6">${esc(e.time)}</div></div>`;
    const a=assetByTag(e.code); if(!a) return '';
    const usr=assignedToUser(a)?user(a):(assignedToDept(a)?('Phòng '+dept(a)+' (dùng chung)'):'');
    const hasUser=assignedToUser(a);
    const second = hasUser ? `<button class="btn-sm danger" onclick="qrRecall('${esc(e.code)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14l-5-5 5-5"/><path d="M4 9h11a5 5 0 015 5"/></svg>Thu hồi</button>`
      : `<button class="btn-sm go" onclick="qrAllocate('${esc(e.code)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 00-5 5"/></svg>Cấp phát</button>`;
    return `<div class="qr-card">
      <div class="qcode"><span class="mono">${esc(tag(a))}</span> — ${esc(name(a))}</div>
      <div class="qsub">Người sử dụng: ${usr?('<b style="color:var(--ink)">'+esc(usr)+'</b>'):'<span style="opacity:.6">(không có)</span>'}</div>
      <div class="qsub">Tình trạng: ${statusChip(status(a))}</div>
      <div class="qbtns"><button class="btn-sm danger" onclick="qrMarkBroken('${esc(e.code)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>Hỏng</button>${second}<span class="qsub mono" style="margin-left:auto;align-self:center;opacity:.6">${esc(e.time)}</span></div>
    </div>`;
  }).join('');
}
function qrMarkBroken(t){ const a=assetByTag(t); if(!a)return;
  OVERRIDES[t]=Object.assign({},OVERRIDES[t],{c27:'',c28:'',c29:'',c30:'',c31:'',c32:'',c33:'',_deptAssigned:false,c34:ST.BROKEN,c40:'',c43:today()});
  save(K_OV,OVERRIDES); render(); renderQrLog(); toast('Đã đánh dấu hỏng: '+t); }
function qrRecall(t){ clearAssign(t,ST.WAIT); save(K_OV,OVERRIDES); render(); renderQrLog(); toast('Đã thu hồi '+t); }
function qrAllocate(t){ if(camRunning)stopCam(); openAllocate(t,'qr'); }
function clearQrLog(){ QR_LOG=[]; renderQrLog(); const inp=document.getElementById('scanInput'); if(inp)inp.focus(); }

/* ===================== INIT ===================== */
/* Ngăn kéo / ẩn hiện sidebar */
(function(){
  const app=document.querySelector('.app'), sidebar=document.querySelector('.sidebar'), mb=document.getElementById('menuBtn'), bd=document.getElementById('sideBackdrop');
  if(!sidebar||!mb||!bd)return;
  const isMobile=()=>window.matchMedia('(max-width:760px)').matches;
  const closeD=()=>{ sidebar.classList.remove('open'); bd.classList.remove('show'); };
  mb.onclick=()=>{ if(isMobile()){ const open=sidebar.classList.toggle('open'); bd.classList.toggle('show',open); } else { app.classList.toggle('nav-collapsed'); } };
  bd.onclick=closeD;
  sidebar.addEventListener('click',e=>{ if(e.target.closest('.navitem')||e.target.closest('.subitem'))closeD(); });
})();
const _qrBtn=document.getElementById('qrScanBtn'); if(_qrBtn)_qrBtn.onclick=openQrScan;
/* Mở chi tiết khi bấm thẻ nhân viên / phòng ban (uỷ quyền sự kiện, gắn 1 lần) */
document.getElementById('content').addEventListener('click',e=>{
  const emp=e.target.closest('[data-emp]'); if(emp){ openEmployee(emp.dataset.emp); return; }
  const dp=e.target.closest('[data-dept]'); if(dp){ openDept(dp.dataset.dept); return; }
});
